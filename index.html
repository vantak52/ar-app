<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Сканер Дигги</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Убираем скролл */
            background-color: #000;
        }

        #video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Видео на весь экран */
        }

        #canvas {
            display: none; /* Холст прячем, он нужен только для математики */
        }

        #diggy-sticker {
            position: absolute;
            display: none; /* Прячем Дигги до нахождения QR-кода */
            width: 150px; /* Размер твоего стикера */
            transform: translate(-50%, -50%); /* Центруем стикер ровно по координатам */
            z-index: 999;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="diggy-sticker" src="diggy.png" alt="Дигги">

    <script>
        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
        const sticker = document.getElementById("diggy-sticker");

        // 1. Запрашиваем доступ к задней камере телефона
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.play();
                requestAnimationFrame(tick); // Запускаем цикл
            })
            .catch(function(err) {
                alert("Ошибка доступа к камере: " + err);
            });

        // 2. Главный цикл анализа видео
        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Копируем размеры видео на холст
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                
                // Рисуем текущий кадр на скрытом холсте
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                // Достаем сырые пиксели
                var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                
                // 3. ИЩЕМ QR-КОД с помощью jsQR
                var code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    // Если нашли QR-код:
                    
                    // Высчитываем центр QR-кода (усредняем углы)
                    var centerX = (code.location.topLeftCorner.x + code.location.bottomRightCorner.x) / 2;
                    var centerY = (code.location.topLeftCorner.y + code.location.bottomRightCorner.y) / 2;

                    // Учитываем масштабирование экрана (если телефон вытянутый)
                    var rect = video.getBoundingClientRect();
                    
                    // Хитрый пересчет координат из-за object-fit: cover
                    var scale = Math.max(rect.width / video.videoWidth, rect.height / video.videoHeight);
                    var xOffset = (rect.width - video.videoWidth * scale) / 2;
                    var yOffset = (rect.height - video.videoHeight * scale) / 2;

                    var finalX = centerX * scale + xOffset;
                    var finalY = centerY * scale + yOffset;

                    // Показываем Дигги и ставим его ровно в центр QR-кода
                    sticker.style.display = "block";
                    sticker.style.left = finalX + "px";
                    sticker.style.top = finalY + "px";

                } else {
                    // Если камера потеряла QR-код - прячем Дигги
                    sticker.style.display = "none";
                }
            }
            // Вызываем функцию снова для следующего кадра (60 раз в секунду)
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
